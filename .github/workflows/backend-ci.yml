name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/backend-cd.yml"

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    services:
      mongodb:
        image: mongo:8
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: Asdqwe123!
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand({ ping: 1 })' | mongosh mongodb://admin:Asdqwe123!@localhost:27017/admin --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: admin
          RABBITMQ_DEFAULT_PASS: Asdqwe123!
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Wait for MongoDB and RabbitMQ
        working-directory: .
        run: |
          set -e
          for i in {1..30}; do
            if (echo > /dev/tcp/localhost/27017) >/dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "MongoDB is not ready"
              exit 1
            fi
            sleep 1
          done
          for i in {1..30}; do
            if (echo > /dev/tcp/localhost/5672) >/dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "RabbitMQ is not ready"
              exit 1
            fi
            sleep 1
          done

      - name: E2E tests
        env:
          TEST_MONGODB_URI: mongodb://admin:Asdqwe123%21@localhost:27017/csv_import_service?authSource=admin
          TEST_RABBITMQ_URL: amqp://admin:Asdqwe123%21@localhost:5672
        run: npm run test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build -f backend/Dockerfile -t backend-ci:${{ github.sha }} .
        working-directory: .
