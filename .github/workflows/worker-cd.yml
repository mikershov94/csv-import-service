name: Worker CD

on:
  push:
    tags:
      - "worker-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to deploy (example: worker-v1.0.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    name: Publish Worker Image
    runs-on: ubuntu-latest
    environment: worker-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Ensure tag commit is in main
        run: |
          git fetch origin main --depth=1
          git branch --remotes --contains "$GITHUB_SHA" | grep "origin/main"

      - name: Set lowercase image owner
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/csv-import-service-worker
          tags: |
            type=ref,event=tag
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
